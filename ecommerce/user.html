<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBEzu1v0s0OxYOIgzdCWMLmt5dd-wX5lO8",
        authDomain: "umastore-4f131.firebaseapp.com",
        projectId: "umastore-4f131",
        storageBucket: "umastore-4f131.firebasestorage.app",
        messagingSenderId: "772729193852",
        appId: "1:772729193852:web:983919536e8196abc110f9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Check Login Status
    auth.onAuthStateChanged(user => {
        if (user) {
            // User login hai
            document.getElementById('userPhoneDisplay').innerText = user.phoneNumber || "Verified User";
            loadUserData(user.uid);
        } else {
            // Login nahi hai toh login page par bhejo
            window.location.href = 'login.html';
        }
    });

    async function loadUserData(uid) {
        // Firebase se orders ginn-na
        const snapshot = await db.collection("orders").where("userId", "==", uid).get();
        document.getElementById('orderCount').innerText = snapshot.size;
    }

    function userLogout() {
        if(confirm("Bhai, kya aap sach mein logout karna chahte hain?")) {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    }
</script>

</body>
