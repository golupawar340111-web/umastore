        <div class="benefits-box">

                <li><i class="fa fa-check-circle"></i> 100% Organic & Fresh</li>
                <li><i class="fa fa-check-circle"></i> Pure Indian Quality</li>
            </ul>
        </div>

        <p id="pDesc">Product ki jankari load ho rahi hai...</p>

        <div class="delivery-info">
            <i class="fa fa-truck"></i> Delivery in 2-3 Days | Indore
        </div>

    <button class="add-cart" onclick="addToCart()">Add to Cart</button>

</div>
