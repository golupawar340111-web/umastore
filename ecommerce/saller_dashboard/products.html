<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management | Seller Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="products.css">
</head>
<body>

<header class="dashboard-header">
    <div class="header-main">
        <h1><i class="fas fa-box-open"></i> My Products</h1>
        <button class="btn-primary" onclick="openProductModal()">
            <i class="fas fa-plus"></i> Add New Product
        </button>
    </div>
</header>

<main class="products-wrapper">
    <section class="filter-bar">
        <select id="categoryFilter" onchange="filterByCategory()">
            <option value="all">All Categories</option>
            <option value="Grocery">Grocery</option>
            <option value="Farming">Farming</option>
            <option value="Daily Use">Daily Use</option>
        </select>
        <div class="search-box">
            <input type="text" id="productSearch" placeholder="Search product..." onkeyup="searchProducts()">
        </div>
    </section>

    <div class="products-grid" id="productGrid">
        <div class="loading-spinner">Loading your digital shop...</div>
    </div>
</main>

<div id="productModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Add New Product</h3>
            <span class="close-btn" onclick="closeProductModal()">&times;</span>
        </div>
        <form id="productForm">
            <input type="hidden" id="productId">
            
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="pName" required placeholder="e.g. Basmati Rice">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="pPrice" required>
                </div>
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input type="number" id="pStock" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Category</label>
                    <select id="pCategory">
                        <option value="Grocery">Grocery</option>
                        <option value="Farming">Farming</option>
                        <option value="Daily Use">Daily Use</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tag (Optional)</label>
                    <select id="pTag">
                        <option value="None">None</option>
                        <option value="New">New Arrival</option>
                        <option value="Offer">Special Offer</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="pDesc" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Product Photo</label>
                <input type="file" id="pPhoto" accept="image/*">
                <small>Upload clear image for better sales</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">Save Product</button>
            </div>
        </form>
    </div>
</div>

<script src="products.js"></script>
</body>
</html>
