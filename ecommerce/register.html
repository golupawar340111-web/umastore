<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Uma Store</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo" onclick="window.location.href='index.html'">
            UMA<span>STORE</span>
        </div>

        <div class="auth-card" id="registerCard">
            <h2>Create Account</h2>
            <p class="subtitle">Enter details to get started</p>

            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label>Mobile Number</label>
                    <div class="mobile-input">
                        <span>+91</span>
                        <input type="tel" id="regMobile" placeholder="98765 XXXXX" maxlength="10" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Create Password</label>
                    <input type="password" id="regPass" placeholder="Min. 6 characters" required>
                </div>

                <div id="recaptcha-container"></div>

                <button type="submit" class="auth-btn" id="sendOtpBtn">Send OTP <i class="fas fa-arrow-right"></i></button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>

        <div class="auth-card hidden" id="otpCard">
            <h2>Verify Mobile</h2>
            <p class="subtitle">Enter the 6-digit code sent to your phone</p>
            
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
                <input type="text" maxlength="1" class="otp-box">
            </div>

            <button class="auth-btn" onclick="verifyOTP()">Verify & Start Shopping</button>
            <p class="resend">Didn't get code? <a href="#" onclick="window.location.reload()">Try Again</a></p>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
