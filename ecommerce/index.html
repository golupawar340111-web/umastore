<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aapki Dukaan | Fast Local Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="top-bar">
    <div class="contact"><i class="fas fa-phone"></i> +91 9201380750</div>
    
    <div class="seller-link" onclick="window.location.href='sellerregistration.html'" style="cursor:pointer; background: #ffbe0b; color: #000; padding: 2px 10px; border-radius: 4px; font-weight: bold; font-size: 12px;">
        <i class="fas fa-store"></i> Become a Seller
    </div>

    <div class="promo">FAST LOCAL DELIVERY!</div>
    <div class="wa-top"><i class="fab fa-whatsapp"></i></div>
</div>

    <header>
        <div class="logo" onclick="window.location.href='index.html'">UMA<span>STORE</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search products (e.g. Health, Milk)..." onkeyup="searchProduct()">
            <button><i class="fas fa-search"></i></button>
        </div>
        
        <div class="header-icons" id="authSection">
            <div class="icon-item" onclick="window.location.href='login.html'">
                <i class="fas fa-user"></i>
                <span>Login</span>
            </div>
            <div class="icon-item" onclick="window.location.href='register.html'">
                <i class="fas fa-user-plus"></i>
                <span>Register</span>
            </div>
            <div class="icon-item cart-btn" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-text">
            <h1>Fresh Products, <span>Direct to Home</span></h1>
            <p>Apne area ki sabse bharosemand dukaan ab aapke phone par.</p>
            <button class="shop-now" onclick="document.getElementById('shop').scrollIntoView()">Shop Now <i class="fas fa-arrow-right"></i></button>
        </div>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="filterCategory('Health')"><i class="fas fa-heartbeat"></i><p>Health</p></div>
        <div class="cat-card" onclick="filterCategory('Daily')"><i class="fas fa-shopping-basket"></i><p>Daily Use</p></div>
        <div class="cat-card" onclick="filterCategory('Farming')"><i class="fas fa-seedling"></i><p>Farming</p></div>
        <div class="cat-card" onclick="filterCategory('Education')"><i class="fas fa-book"></i><p>Education</p></div>
    </section>

    <main id="shop">
        <h2 class="section-title">Trending Products</h2>
        <div class="product-grid" id="productGrid"></div>
    </main>

    <div id="sideCart" class="side-cart">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <span onclick="toggleCart()">&times;</span>
        </div>
        <div id="cartItems"></div>
        <div class="cart-footer">
            <h4 id="cartTotal">Total: ₹0</h4>
            <button class="checkout-btn" onclick="window.location.href='checkout.html'">Go to Checkout <i class="fas fa-credit-card"></i></button>
            <button class="checkout-btn" style="background:#25D366; margin-top:5px;" onclick="checkoutWhatsApp()">Order via WhatsApp <i class="fab fa-whatsapp"></i></button>
        </div>
    </div>

    <a href="https://wa.me/919201380750" class="floating-wa" target="_blank">
        <i class="fab fa-whatsapp"></i> Chat with Us
    </a>

    <script src="script.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBEzu1v0s0OxYOIgzdCWMLmt5dd-wX5lO8",
            authDomain: "umastore-4f131.firebaseapp.com",
            projectId: "umastore-4f131",
            storageBucket: "umastore-4f131.firebasestorage.app",
            messagingSenderId: "772729193852",
            appId: "1:772729193852:web:983919536e8196abc110f9"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // 🔥 1. Auth Status check & Header Update Logic
        firebase.auth().onAuthStateChanged((user) => {
            const authSection = document.getElementById('authSection');
            if (user) {
                // User is Logged In: Replace Login/Register with Account, Orders & Logout
                authSection.innerHTML = `
                    <div class="icon-item" onclick="window.location.href='user.html'" style="cursor:pointer">
                        <i class="fas fa-user-circle" style="color:#4361ee"></i>
                        <span>My Account</span>
                    </div>
                    
                    <div class="icon-item" onclick="firebase.auth().signOut().then(() => location.reload())" style="cursor:pointer">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </div>
                    <div class="icon-item cart-btn" onclick="window.location.href='cart.html'" style="cursor:pointer">
    <i class="fas fa-shopping-cart"></i>
    <span id="cart-count">0</span>
</div>
                `;
            } else {
                // User is Logged Out: Show Default Login/Register
                authSection.innerHTML = `
                    <div class="icon-item" onclick="window.location.href='login.html'">
                        <i class="fas fa-user"></i>
                        <span>Login</span>
                    </div>
                    <div class="icon-item" onclick="window.location.href='register.html'">
                        <i class="fas fa-user-plus"></i>
                        <span>Register</span>
                    </div>
                    <div class="icon-item cart-btn" onclick="toggleCart()">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </div>
                `;
            }
        });

        // 2. Real Products Load karna
        async function loadProducts() {
            const grid = document.getElementById('productGrid');
            const snapshot = await db.collection("products").get();
            grid.innerHTML = ""; 
            snapshot.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div class="product-card" onclick="window.location.href='product.html?id=${doc.id}'">
                        <img src="${p.images ? p.images[0] : 'placeholder.jpg'}" alt="${p.name}">
                        <div class="p-details">
                            <h3>${p.name}</h3>
                            <p class="p-price">₹${p.price} <span class="p-mrp">₹${p.mrp || p.price + 100}</span></p>
                            <button class="add-to-cart-btn" onclick="event.stopPropagation(); addToCart('${doc.id}', '${p.name}', ${p.price}, '${p.images ? p.images[0] : 'placeholder.jpg'}')">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        loadProducts(); 
        
    </script>
    <script src="script.js"></script>
</body>
</html>
