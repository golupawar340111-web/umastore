<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | UMA Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body>

    <div class="cart-container">
        <header class="cart-header">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <h1>Your Cart</h1>
            <span id="items-count">0 Items</span>
        </header>

        <div id="cart-items-wrapper">
            <div class="loader">Loading your selection...</div>
        </div>

        <footer class="cart-footer">
            <div class="summary-details">
                <div class="summary-line">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-line">
                    <span>Delivery Fee</span>
                    <span class="free-delivery">FREE</span>
                </div>
                <hr>
                <div class="summary-line total">
                    <span>Grand Total</span>
                    <span id="grand-total">₹0</span>
                </div>
            </div>

            <button class="checkout-btn" onclick="proceedToCheckout()">
                Proceed to Checkout <i class="fas fa-arrow-right"></i>
            </button>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="cart.js"></script>
</body>
</html>
